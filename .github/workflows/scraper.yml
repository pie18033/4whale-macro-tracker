name: Whale Macro Tracker Auto Scraper

on:
  schedule:
    # 這裡設定每 30 分鐘執行一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 這個超好用！允許你在 GitHub 網頁上「手動按按鈕」立刻執行測試

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase python-dotenv pandas

      - name: Run Scraper
        env:
          # 這裡會去讀取我們等一下要在 GitHub 設定的密碼本
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python whale_macro_tracker.py
